<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>영어회화 MP3 플레이어</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <div>
          <p class="eyebrow">English conversation practice</p>
          <h1>영어회화 MP3 플레이어</h1>
        </div>
        <p id="trackCount" class="track-count" aria-live="polite">불러오는 중</p>
      </header>

      <section class="player-panel" aria-label="MP3 플레이어">
        <div class="now-playing">
          <p class="label">현재 재생</p>
          <h2 id="currentTitle">파일을 선택하세요</h2>
        </div>

        <audio id="audioPlayer" preload="metadata"></audio>

        <div class="time-row">
          <span id="currentTime">0:00</span>
          <input id="seekBar" type="range" min="0" max="100" value="0" step="0.1" aria-label="재생 위치">
          <span id="duration">0:00</span>
        </div>

        <div class="controls" aria-label="재생 제어">
          <button id="prevButton" type="button" aria-label="이전 파일">이전</button>
          <button id="playButton" class="primary" type="button" aria-label="재생 또는 일시정지">재생</button>
          <button id="nextButton" type="button" aria-label="다음 파일">다음</button>
        </div>

        <div class="options">
          <label for="speedSelect">속도</label>
          <select id="speedSelect">
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
          </select>

          <label class="repeat-toggle">
            <input id="repeatToggle" type="checkbox">
            한 파일 반복
          </label>

          <label class="file-loader">
            <input id="fileInput" type="file" accept="audio/mpeg,audio/mp3,.mp3" multiple>
            파일 선택
          </label>
        </div>

        <p id="statusMessage" class="status-message" aria-live="polite"></p>
      </section>

      <section class="library-panel" aria-labelledby="libraryTitle">
        <div class="library-header">
          <h2 id="libraryTitle">MP3 목록</h2>
          <input id="searchInput" type="search" placeholder="파일 검색" aria-label="파일 검색">
        </div>
        <ol id="trackList" class="track-list"></ol>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
